<!doctype html><html><head><meta charset="utf-8"><title>Ink</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row" style="gap:0; border:var(--border-hair);">
    <div style="flex:1; background:var(--ink); color:var(--paper); padding:16px 14px; min-height:120px; border-right:var(--border-hair);">
      <div class="eyebrow" style="color:var(--paper)">ink</div>
      <div class="mono" style="color:var(--paper); margin-top:6px">oklch(0.22 0.02 255)</div>
      <div class="mono" style="color:var(--paper)">--ink</div>
    </div>
    <div style="flex:1; background:var(--ink-soft); color:var(--paper); padding:16px 14px; min-height:120px; border-right:var(--border-hair);">
      <div class="eyebrow" style="color:var(--paper)">ink-soft</div>
      <div class="mono" style="color:var(--paper); margin-top:6px">oklch(0.40 0.018 255)</div>
      <div class="mono" style="color:var(--paper)">--ink-soft</div>
    </div>
    <div style="flex:1; background:var(--ink-faint); color:var(--paper); padding:16px 14px; min-height:120px;">
      <div class="eyebrow" style="color:var(--paper)">ink-faint</div>
      <div class="mono" style="color:var(--paper); margin-top:6px">oklch(0.58 0.014 255)</div>
      <div class="mono" style="color:var(--paper)">--ink-faint</div>
    </div>
  </div>
  <div class="mono muted">Warm blue-black, never pure. Primary, secondary, placeholder.</div>
</div>
</body></html>
