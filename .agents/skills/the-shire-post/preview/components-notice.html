<!doctype html><html><head><meta charset="utf-8"><title>Notice card</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <article style="background:var(--paper); border:var(--border-hair); padding:22px 24px; max-width:620px;">
    <div class="eyebrow" style="margin-bottom:10px;">notice no. 042 · posted 12 march</div>
    <h3 style="font:var(--t-h3); margin:0 0 8px 0;">Held for collection</h3>
    <p style="font:var(--t-body); margin:0; color:var(--ink-soft);">
      A small number of parcels remain in pigeonhole 14 and may be claimed
      by their addressees on production of the proper mark.
    </p>
    <hr style="border:0; border-top:var(--border-hair); margin:18px 0 12px;">
    <div class="mono" style="font-size:11px;">— the clerk on duty</div>
  </article>
</div>
</body></html>
