<!doctype html><html><head><meta charset="utf-8"><title>Typographic ornaments</title><link rel="stylesheet" href="_card.css">
<style>
  .glyph { display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px 8px; border:var(--border-hair); min-width:80px; }
  .glyph .g { font:400 36px/1 var(--font-display); color:var(--ink); }
  .glyph .n { font:var(--t-ledger); color:var(--ink-soft); font-size:10px; text-align:center; }
</style>
</head>
<body>
<div class="card">
  <div class="row" style="gap:10px;">
    <div class="glyph"><div class="g">❦</div><div class="n">fleuron · u+2766</div></div>
    <div class="glyph"><div class="g">❧</div><div class="n">aldus leaf · u+2767</div></div>
    <div class="glyph"><div class="g">☙</div><div class="n">reverse leaf · u+2619</div></div>
    <div class="glyph"><div class="g">¶</div><div class="n">pilcrow · u+00b6</div></div>
    <div class="glyph"><div class="g">§</div><div class="n">section · u+00a7</div></div>
    <div class="glyph"><div class="g">†</div><div class="n">dagger · u+2020</div></div>
    <div class="glyph"><div class="g">‡</div><div class="n">double dagger · u+2021</div></div>
    <div class="glyph"><div class="g">✦</div><div class="n">four-pt star · u+2726</div></div>
  </div>
  <div class="mono muted">The Post's "icon system." Typographic glyphs first; functional icons (Phosphor) only when unavoidable.</div>
</div>
</body></html>
