<!doctype html><html><head><meta charset="utf-8"><title>Eyebrow + heading</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:6px;">
    <div class="eyebrow">section iii · office hours</div>
    <h2 style="font:var(--t-h2); margin:0;">The counter is open on Tuesdays and Fridays</h2>
    <hr style="border:0; border-top:var(--border-rule); margin:10px 0 0; width:48px;">
  </div>
  <p style="font:var(--t-body-lg); color:var(--ink-soft); margin:0; max-width:560px;">
    Mono eyebrow → IM Fell heading → 48px ink rule. The same shape every time;
    that is what makes the page read as printed matter and not as a website.
  </p>
</div>
</body></html>
