<!doctype html><html><head><meta charset="utf-8"><title>Semantic colours</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:0; border:var(--border-hair);">
    <div class="row" style="justify-content:space-between; padding:10px 14px; border-bottom:var(--border-hair); gap:8px;">
      <span class="eyebrow">background</span>
      <span class="mono">--bg → paper · --bg-deep → paper-deep</span>
    </div>
    <div class="row" style="justify-content:space-between; padding:10px 14px; border-bottom:var(--border-hair); gap:8px;">
      <span class="eyebrow">foreground</span>
      <span class="mono">--fg → ink · --fg-soft → ink-soft · --fg-faint → ink-faint</span>
    </div>
    <div class="row" style="justify-content:space-between; padding:10px 14px; border-bottom:var(--border-hair); gap:8px;">
      <span class="eyebrow">link</span>
      <span class="mono">--link → ink · --link-hover → wax</span>
    </div>
    <div class="row" style="justify-content:space-between; padding:10px 14px; border-bottom:var(--border-hair); gap:8px;">
      <span class="eyebrow">accent</span>
      <span class="mono">--accent → wax · --accent-hover → wax-deep</span>
    </div>
    <div class="row" style="justify-content:space-between; padding:10px 14px; border-bottom:var(--border-hair); gap:8px;">
      <span class="eyebrow">positive</span>
      <span class="mono">--positive → hedge</span>
    </div>
    <div class="row" style="justify-content:space-between; padding:10px 14px; gap:8px;">
      <span class="eyebrow">critical</span>
      <span class="mono">--critical → wax · --critical-bg → wax-soft</span>
    </div>
  </div>
</div>
</body></html>
