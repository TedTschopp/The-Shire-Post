<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row" style="gap:24px;">
    <div class="col" style="gap:8px; align-items:center;">
      <div style="width:140px; height:80px; background:var(--paper); border:var(--border-hair); box-shadow:none;"></div>
      <div class="eyebrow">shadow-none</div>
      <div class="mono">flat · default</div>
    </div>
    <div class="col" style="gap:8px; align-items:center;">
      <div style="width:140px; height:80px; background:var(--paper); box-shadow:var(--shadow-stamp);"></div>
      <div class="eyebrow">shadow-stamp</div>
      <div class="mono">stamped, 1px ring</div>
    </div>
    <div class="col" style="gap:8px; align-items:center;">
      <div style="width:140px; height:80px; background:var(--paper); box-shadow:var(--shadow-card);"></div>
      <div class="eyebrow">shadow-card</div>
      <div class="mono">hovering notice</div>
    </div>
  </div>
  <div class="mono muted">Two tokens, used sparingly. Default is no shadow.</div>
</div>
</body></html>
