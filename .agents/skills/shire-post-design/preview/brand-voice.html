<!doctype html><html><head><meta charset="utf-8"><title>Voice — do &amp; don't</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row" style="gap:18px; align-items:stretch;">
    <div style="flex:1; border:var(--border-hair); padding:14px 16px; background:var(--paper);">
      <div class="eyebrow" style="color:var(--hedge);">say this</div>
      <p style="font:var(--t-body); margin:8px 0 0;">
        The counter is staffed Tuesdays and Fridays. Letters posted by the
        close of business on Friday will be franked the same evening.
      </p>
    </div>
    <div style="flex:1; border:var(--border-hair); padding:14px 16px; background:var(--wax-soft);">
      <div class="eyebrow" style="color:var(--wax-deep);">not this</div>
      <p style="font:var(--t-body); margin:8px 0 0; color:var(--ink-soft);">
        Welcome to The Shire Post! 📮 Sign up to never miss a letter ✨ — join
        our cozy community of correspondents today!
      </p>
    </div>
  </div>
</div>
</body></html>
