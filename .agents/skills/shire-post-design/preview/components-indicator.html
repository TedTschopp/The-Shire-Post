<!doctype html><html><head><meta charset="utf-8"><title>Office hours indicator</title><link rel="stylesheet" href="_card.css">
<style>
  .indicator { display:inline-flex; align-items:center; gap:10px; padding:8px 14px; border:var(--border-hair); }
  .dot { width:10px; height:10px; border-radius:9999px; background:var(--hedge); box-shadow:0 0 0 3px var(--hedge-soft); }
  .dot.closed { background:var(--ink-faint); box-shadow:0 0 0 3px var(--paper-deep); }
  .lbl { font:var(--t-eyebrow); text-transform:uppercase; letter-spacing:var(--tracking-eyebrow); }
</style>
</head>
<body>
<div class="card">
  <div class="row" style="gap:18px;">
    <span class="indicator"><span class="dot"></span><span class="lbl">Counter open</span><span class="mono muted">until 17:00</span></span>
    <span class="indicator"><span class="dot closed"></span><span class="lbl">Counter closed</span><span class="mono muted">re-opens Tuesday</span></span>
  </div>
  <div class="mono muted">The single "live" element on the site. Hedge dot when open, ink-faint when closed.</div>
</div>
</body></html>
