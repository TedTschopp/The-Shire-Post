<!doctype html><html><head><meta charset="utf-8"><title>Sealmark</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex; align-items:center; gap:32px; padding:16px;">
    <img src="../assets/sealmark.svg" alt="The Shire Post sealmark" style="width:170px; height:170px;">
    <div class="col" style="gap:8px; flex:1;">
      <div class="eyebrow">sealmark</div>
      <div style="font:var(--t-h3);">A typographic postmark</div>
      <p style="font:var(--t-caption); color:var(--ink-soft); margin:0; max-width:340px;">
        Concentric rings, town-name arc, central fleuron. <strong>No figurative artwork</strong>,
        no franchise iconography. Used decoratively, never as a button glyph.
      </p>
    </div>
  </div>
</div>
</body></html>
