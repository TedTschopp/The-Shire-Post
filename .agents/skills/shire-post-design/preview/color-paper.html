<!doctype html><html><head><meta charset="utf-8"><title>Paper surfaces</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row" style="gap:0; border:var(--border-hair);">
    <div style="flex:1; background:var(--paper); padding:16px 14px; min-height:120px; border-right:var(--border-hair);">
      <div class="eyebrow">paper</div>
      <div class="mono" style="margin-top:6px">oklch(0.965 0.013 82)</div>
      <div class="mono">--paper</div>
    </div>
    <div style="flex:1; background:var(--paper-deep); padding:16px 14px; min-height:120px; border-right:var(--border-hair);">
      <div class="eyebrow">paper-deep</div>
      <div class="mono" style="margin-top:6px">oklch(0.930 0.018 80)</div>
      <div class="mono">--paper-deep</div>
    </div>
    <div style="flex:1; background:var(--paper-edge); padding:16px 14px; min-height:120px; border-right:var(--border-hair);">
      <div class="eyebrow">paper-edge</div>
      <div class="mono" style="margin-top:6px">oklch(0.880 0.022 78)</div>
      <div class="mono">--paper-edge</div>
    </div>
    <div style="flex:1; background:var(--paper-shade); padding:16px 14px; min-height:120px;">
      <div class="eyebrow">paper-shade</div>
      <div class="mono" style="margin-top:6px">oklch(0.820 0.025 76)</div>
      <div class="mono">--paper-shade</div>
    </div>
  </div>
  <div class="mono muted">Warm parchment whites. Never pure #fff. Used flat — no gradients.</div>
</div>
</body></html>
