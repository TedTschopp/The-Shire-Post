<!doctype html><html><head><meta charset="utf-8"><title>Hedge & brass</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row" style="gap:0; border:var(--border-hair);">
    <div style="flex:1; background:var(--hedge); color:var(--paper); padding:16px 14px; min-height:120px; border-right:var(--border-hair);">
      <div class="eyebrow" style="color:var(--paper)">hedge</div>
      <div class="mono" style="color:var(--paper); margin-top:6px">oklch(0.46 0.06 145)</div>
      <div class="mono" style="color:var(--paper)">--hedge · "open" tick</div>
    </div>
    <div style="flex:1; background:var(--hedge-soft); color:var(--ink); padding:16px 14px; min-height:120px; border-right:var(--border-hair);">
      <div class="eyebrow">hedge-soft</div>
      <div class="mono" style="margin-top:6px">oklch(0.90 0.025 145)</div>
      <div class="mono">--hedge-soft · wash</div>
    </div>
    <div style="flex:1; background:var(--brass); color:var(--ink); padding:16px 14px; min-height:120px;">
      <div class="eyebrow">brass</div>
      <div class="mono" style="margin-top:6px">oklch(0.68 0.08 82)</div>
      <div class="mono">--brass · ornament</div>
    </div>
  </div>
  <div class="mono muted">Muted field green and aged brass. Decorative; never load-bearing.</div>
</div>
</body></html>
