<!doctype html><html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row" style="gap:20px; align-items:flex-end;">
    <div class="col" style="gap:6px; align-items:center;">
      <div style="width:80px; height:80px; background:var(--paper-deep); border:var(--border-hair); border-radius:0;"></div>
      <div class="eyebrow">radius-0</div>
      <div class="mono">0px · default</div>
    </div>
    <div class="col" style="gap:6px; align-items:center;">
      <div style="width:80px; height:80px; background:var(--paper-deep); border:var(--border-hair); border-radius:2px;"></div>
      <div class="eyebrow">radius-stamp</div>
      <div class="mono">2px · inputs, buttons</div>
    </div>
    <div class="col" style="gap:6px; align-items:center;">
      <div style="width:80px; height:80px; background:var(--wax); border-radius:9999px;"></div>
      <div class="eyebrow">radius-full</div>
      <div class="mono">circular seals only</div>
    </div>
  </div>
  <div class="mono muted">The Post does not round things. Radius is, by intention, almost zero.</div>
</div>
</body></html>
