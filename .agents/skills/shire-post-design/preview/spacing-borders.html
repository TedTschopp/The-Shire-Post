<!doctype html><html><head><meta charset="utf-8"><title>Borders &amp; rules</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:14px;">
    <div class="col" style="gap:6px;">
      <div class="eyebrow">border-hair · 1px paper-edge</div>
      <hr style="border:0; border-top:var(--border-hair); margin:0;">
    </div>
    <div class="col" style="gap:6px;">
      <div class="eyebrow">border-rule · 1px ink</div>
      <hr style="border:0; border-top:var(--border-rule); margin:0;">
    </div>
    <div class="col" style="gap:6px;">
      <div class="eyebrow">border-dashed · tear-off slip</div>
      <hr style="border:0; border-top:var(--border-dashed); margin:0;">
    </div>
    <div class="col" style="gap:6px;">
      <div class="eyebrow">border-double · 3px double ink — ceremonial</div>
      <hr style="border:0; border-top:var(--border-double); margin:0;">
    </div>
  </div>
</div>
</body></html>
