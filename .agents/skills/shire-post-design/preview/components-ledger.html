<!doctype html><html><head><meta charset="utf-8"><title>Ledger row</title><link rel="stylesheet" href="_card.css">
<style>
  table.ledger { width:100%; border-collapse:collapse; font:var(--t-ledger); font-feature-settings:"tnum","zero"; }
  table.ledger th, table.ledger td { text-align:left; padding:10px 12px; border-bottom:var(--border-hair); }
  table.ledger thead th { background:var(--paper-deep); color:var(--ink-soft); text-transform:uppercase; letter-spacing:var(--tracking-eyebrow); font-size:11px; }
  table.ledger tbody tr:nth-child(even) td { background: color-mix(in oklab, var(--paper-deep), var(--paper) 60%); }
  table.ledger td.num { text-align:right; }
  .tick { color: var(--hedge); }
</style>
</head>
<body>
<div class="card">
  <table class="ledger">
    <thead><tr><th>No.</th><th>Posted</th><th>From</th><th>To</th><th>Status</th></tr></thead>
    <tbody>
      <tr><td>041</td><td>2026-03-10</td><td>m. ashford</td><td>j. greaves</td><td><span class="tick">✓ franked</span></td></tr>
      <tr><td>042</td><td>2026-03-12</td><td>r. coombe</td><td>—</td><td>held · pigeonhole 14</td></tr>
      <tr><td>043</td><td>2026-03-12</td><td>p. fenwick</td><td>e. mallow</td><td><span class="tick">✓ franked</span></td></tr>
    </tbody>
  </table>
</div>
</body></html>
