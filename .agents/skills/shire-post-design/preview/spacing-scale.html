<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col" style="gap:8px;">
    <div class="eyebrow">8-pt spacing scale</div>
    <div class="col" style="gap:6px;">
      <div class="row"><span class="mono label" style="width:60px;">2</span><div style="height:8px; width:2px; background:var(--ink);"></div></div>
      <div class="row"><span class="mono label" style="width:60px;">4</span><div style="height:8px; width:4px; background:var(--ink);"></div></div>
      <div class="row"><span class="mono label" style="width:60px;">8</span><div style="height:8px; width:8px; background:var(--ink);"></div></div>
      <div class="row"><span class="mono label" style="width:60px;">12</span><div style="height:8px; width:12px; background:var(--ink);"></div></div>
      <div class="row"><span class="mono label" style="width:60px;">16</span><div style="height:8px; width:16px; background:var(--ink);"></div></div>
      <div class="row"><span class="mono label" style="width:60px;">24</span><div style="height:8px; width:24px; background:var(--ink);"></div></div>
      <div class="row"><span class="mono label" style="width:60px;">32</span><div style="height:8px; width:32px; background:var(--ink);"></div></div>
      <div class="row"><span class="mono label" style="width:60px;">48</span><div style="height:8px; width:48px; background:var(--ink);"></div></div>
      <div class="row"><span class="mono label" style="width:60px;">64</span><div style="height:8px; width:64px; background:var(--ink);"></div></div>
      <div class="row"><span class="mono label" style="width:60px;">96</span><div style="height:8px; width:96px; background:var(--ink);"></div></div>
    </div>
  </div>
</div>
</body></html>
