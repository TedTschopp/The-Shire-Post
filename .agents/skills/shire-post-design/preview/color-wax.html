<!doctype html><html><head><meta charset="utf-8"><title>Wax</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row" style="gap:0; border:var(--border-hair);">
    <div style="flex:1; background:var(--wax); color:var(--paper); padding:16px 14px; min-height:120px; border-right:var(--border-hair);">
      <div class="eyebrow" style="color:var(--paper)">wax</div>
      <div class="mono" style="color:var(--paper); margin-top:6px">oklch(0.43 0.13 28)</div>
      <div class="mono" style="color:var(--paper)">--wax · primary, seal</div>
    </div>
    <div style="flex:1; background:var(--wax-deep); color:var(--paper); padding:16px 14px; min-height:120px; border-right:var(--border-hair);">
      <div class="eyebrow" style="color:var(--paper)">wax-deep</div>
      <div class="mono" style="color:var(--paper); margin-top:6px">oklch(0.34 0.11 28)</div>
      <div class="mono" style="color:var(--paper)">--wax-deep · pressed</div>
    </div>
    <div style="flex:1; background:var(--wax-soft); color:var(--ink); padding:16px 14px; min-height:120px;">
      <div class="eyebrow">wax-soft</div>
      <div class="mono" style="margin-top:6px">oklch(0.88 0.04 28)</div>
      <div class="mono">--wax-soft · error wash</div>
    </div>
  </div>
  <div class="mono muted">Sealing-wax red — the only saturated colour in the system. Use sparingly.</div>
</div>
</body></html>
