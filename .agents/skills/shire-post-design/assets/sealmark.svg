<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="The Shire Post — postmark">
  <style>
    .ring,
    .ring2 {
      fill: none;
      stroke: #6e2620;
    }

    .ring {
      stroke-width: 2.2;
    }

    .ring2 {
      stroke-width: 0.9;
      opacity: 0.9;
    }

    .label,
    .num,
    .fleur {
      fill: #6e2620;
      font-family: "IM Fell English", Georgia, serif;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .num {
      font-size: 9px;
      letter-spacing: 0.07em;
    }

    .fleur {
      font-size: 34px;
    }
  </style>
  
  <circle cx="100" cy="100" r="90" class="ring"></circle>
  <circle cx="100" cy="100" r="80" class="ring2"></circle>

  
  <defs>
    <path id="topArc" d="M 22 100 A 78 78 0 0 1 178 100" fill="none"></path>
    <path id="bottomArc" d="M 25 100 A 75 75 0 0 0 175 100" fill="none"></path>
  </defs>
  <text class="label">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">THE · SHIRE · POST</textPath>
  </text>
  <text class="num">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">BY · HAND · &amp; · BY · FOOT</textPath>
  </text>

  
  <line x1="40" y1="78" x2="160" y2="78" stroke="#6e2620" stroke-width="0.6"></line>
  <line x1="40" y1="122" x2="160" y2="122" stroke="#6e2620" stroke-width="0.6"></line>

  
  <text x="100" y="113" text-anchor="middle" class="fleur">❦</text>
</svg>