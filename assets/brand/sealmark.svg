  <circle cx="100" cy="100" r="90" class="ring"></circle>
  <circle cx="100" cy="100" r="80" class="ring2"></circle>

  
  <defs>
    <path id="topArc" d="M 22 100 A 78 78 0 0 1 178 100" fill="none"></path>
